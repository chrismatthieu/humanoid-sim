humanoid_retargeter:
  ros__parameters:
    # If true, user's right side controls G1's left side (mirror image, feels
    # natural when watching yourself on screen). If false, copies same-side.
    mirror: true

    # Exponential filter on output joint commands. 0=instant, 1=no motion.
    smoothing_alpha: 0.4

    # Rate at which the retargeter publishes joint commands.
    command_rate_hz: 30.0

    # Min keypoint visibility from MediaPipe (0..1) to use the keypoint.
    # Lower values follow the human more aggressively but accept noisier poses.
    keypoint_min_visibility: 0.5

    # The G1's URDF has head_joint type=fixed -- the head is rigidly bolted
    # to the torso, no neck joint.  To make the robot's head visually
    # follow the operator's head, we route head yaw into waist_yaw.
    #   0.0 = waist follows torso-twist only (original behaviour, robot's
    #         head stays facing forward when you just turn your head)
    #   1.0 = waist follows head yaw 1:1 (robot's body turns whenever you
    #         turn your head; torso-twist contribution suppressed)
    #   0.7 = head dominates, torso-twist mixes in (default; usually feels
    #         natural in a mirror demo)
    head_to_waist_gain: 0.7
    # Direction of the head_yaw -> waist_yaw mapping.  Flip to -1.0 if
    # the robot turns its body to the opposite side of where you look.
    head_yaw_sign: 1.0

    # Per-joint sign flip table.  Each value is +1 or -1.  The geometric IK
    # produces angles that match a canonical convention (see geometric_ik.py);
    # these flips compensate for the actual URDF axis directions of the G1
    # joints discovered during the tuning pass.
    joint_signs:
      waist_yaw_joint: 1.0
      left_shoulder_pitch_joint: 1.0
      # left_shoulder_roll is a chirality-flipping axis under mirror=true.
      # The G1's URDF has both shoulder_roll axes as <axis xyz="1 0 0"/> but
      # the anatomical "outward" direction is +rad on the left and -rad on
      # the right (see joint_limits below: left's max=2.252 reserves room
      # for the +outward side, right's min=-2.252 reserves room for the
      # -outward side).  With mirror=true, IK feeds the operator's *right*
      # arm into the G1's left joints, and the operator's right arm raised
      # outward produces a *negative* IK roll (because operator-right is
      # -y in the shoulder frame).  We need to flip that to positive to
      # actually drive the G1's left arm outward -- hence -1.0 here, the
      # mirror image of the -1.0 on right_shoulder_roll_joint below.
      left_shoulder_roll_joint: -1.0
      left_shoulder_yaw_joint: 1.0
      left_elbow_joint: 1.0
      left_wrist_roll_joint: 1.0
      left_wrist_pitch_joint: 1.0
      left_wrist_yaw_joint: 1.0
      right_shoulder_pitch_joint: 1.0
      right_shoulder_roll_joint: -1.0
      right_shoulder_yaw_joint: -1.0
      right_elbow_joint: 1.0
      right_wrist_roll_joint: -1.0
      right_wrist_pitch_joint: 1.0
      right_wrist_yaw_joint: -1.0

    # Hard clamp per joint (rad). These match the URDF <limit/> tags so the
    # controller never sees out-of-bounds commands.
    joint_limits:
      waist_yaw_joint:               {min: -2.618, max:  2.618}
      left_shoulder_pitch_joint:     {min: -3.089, max:  2.670}
      left_shoulder_roll_joint:      {min: -1.588, max:  2.252}
      left_shoulder_yaw_joint:       {min: -2.618, max:  2.618}
      left_elbow_joint:              {min: -1.047, max:  2.094}
      left_wrist_roll_joint:         {min: -1.972, max:  1.972}
      left_wrist_pitch_joint:        {min: -1.614, max:  1.614}
      left_wrist_yaw_joint:          {min: -1.614, max:  1.614}
      right_shoulder_pitch_joint:    {min: -3.089, max:  2.670}
      right_shoulder_roll_joint:     {min: -2.252, max:  1.588}
      right_shoulder_yaw_joint:      {min: -2.618, max:  2.618}
      right_elbow_joint:             {min: -1.047, max:  2.094}
      right_wrist_roll_joint:        {min: -1.972, max:  1.972}
      right_wrist_pitch_joint:       {min: -1.614, max:  1.614}
      right_wrist_yaw_joint:         {min: -1.614, max:  1.614}

humanoid_pose_estimator:
  ros__parameters:
    color_topic: /camera/camera/color/image_raw
    depth_topic: /camera/camera/aligned_depth_to_color/image_raw
    info_topic:  /camera/camera/aligned_depth_to_color/camera_info
    output_frame: camera_color_optical_frame
    min_confidence: 0.5
    depth_patch: 5         # half-window in pixels for median depth lookup
    model_complexity: 0    # 0=lite (fast on CPU), 1=full, 2=heavy
    publish_debug_image: true
    publish_markers: true
